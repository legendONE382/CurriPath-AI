{% extends "base.html" %}

{% block title %}Curriculum Result{% endblock %}

{% block content %}
<section class="bg-white shadow-lg rounded-2xl p-8">
    <h1 class="text-2xl font-bold mb-2">Your Curriculum</h1>
    <p class="text-slate-600 mb-6">
        <span class="font-semibold">Topic:</span> {{ topic }} |
        <span class="font-semibold">Timeframe:</span> {{ timeframe }} weeks |
        <span class="font-semibold">Level:</span> {{ level }}
    </p>

    <article class="prose max-w-none prose-ul:list-disc prose-li:my-1">
        {{ content|safe }}
    </article>

    <a href="{% url 'home' %}" class="inline-block mt-8 text-indigo-600 hover:text-indigo-800 font-medium">← Create another plan</a>
</section>
{% endblock %}
